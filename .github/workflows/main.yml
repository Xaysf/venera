name: Build znver4 AppImage
run-name: Build znver4 AppImage

on:
  workflow_dispatch: {}
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version-file: pubspec.yaml
          architecture: x64

      - name: Install build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1 libfuse2

      - name: Build Flutter Linux (znver4)
        run: |
          export RUSTFLAGS="-C target-cpu=znver4"
          export CFLAGS="-march=znver4 -mtune=znver4"
          export CXXFLAGS="-march=znver4 -mtune=znver4"
          flutter build linux --release

      - name: Build AppImage
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

          mkdir -p Venera.AppDir
          cp -r build/linux/x64/release/bundle/* Venera.AppDir/

          cat > Venera.AppDir/venera.desktop << EOF
          [Desktop Entry]
          Name=Venera
          Exec=venera
          Icon=venera
          Type=Application
          Categories=Utility;
          EOF

          cp assets/app_icon.png Venera.AppDir/venera.png

          cat > Venera.AppDir/AppRun << EOF
          #!/bin/sh
          HERE=\$(dirname \$(readlink -f "\${0}"))
          exec "\${HERE}"/venera "\$@"
          EOF
          chmod +x Venera.AppDir/AppRun

          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          ./appimagetool Venera.AppDir Venera-${APP_VERSION}-znver4-x86_64.AppImage

          mkdir -p build/linux/appimage
          mv Venera-${APP_VERSION}-znver4-x86_64.AppImage build/linux/appimage/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/linux/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
