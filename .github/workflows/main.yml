name: Build Linux Packages
run-name: Build RPM (v4)

on:
  workflow_dispatch: {}
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04 

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version-file: pubspec.yaml
          architecture: x64

      # Install dependencies
      - name: Install build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1 libfuse2 rpm

      - name: Build Flutter Linux (v4)
        run: |
             export RUSTFLAGS="-C target-cpu=x86-64-v4"
             export CFLAGS="-march=x86-64-v4 -mtune=x86-64-v4"
             export CXXFLAGS="-march=x86-64-v4 -mtune=x86-64-v4"
             flutter build linux --release
          
      - name: Build RPM
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ')

          # Create rpmbuild tree
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Prepare source tarball
          mkdir -p venera-linux
          cp -r build/linux/x64/release/bundle/* venera-linux/
          tar czf ~/rpmbuild/SOURCES/venera-${APP_VERSION}.tar.gz venera-linux

          # Create SPEC
          cat > ~/rpmbuild/SPECS/venera.spec << EOF
          Name:           venera
          Version:        ${APP_VERSION}
          Release:        1%{?dist}
          Summary:        Venera comic reader
          License:        GPL-3.0
          URL:            https://github.com/venera-app/venera
          Source0:        venera-${APP_VERSION}.tar.gz
          BuildArch:      x86_64
          Requires:       gtk3, webkit2gtk4.1

          %description
          Venera comic reader built with Flutter.

          %prep
          %setup -q -n venera-linux

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/lib/venera
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons

          cp -r * %{buildroot}/usr/lib/venera/
          ln -s /usr/lib/venera/venera %{buildroot}/usr/bin/venera

          cat > %{buildroot}/usr/share/applications/venera.desktop << EOD
          [Desktop Entry]
          Name=Venera
          Exec=venera
          Icon=venera
          Type=Application
          Categories=Utility;
          EOD

          cp venera.png %{buildroot}/usr/share/icons/

          %files
          /usr/bin/venera
          /usr/lib/venera/*
          /usr/share/applications/venera.desktop
          /usr/share/icons/venera.png

          %changelog
          EOF

          rpmbuild -bb ~/rpmbuild/SPECS/venera.spec

          mkdir -p build/linux/rpm
          cp ~/rpmbuild/RPMS/x86_64/*.rpm build/linux/rpm/
     
      - uses: actions/upload-artifact@v4
        with:
          name: rpm_x64_build
          path: build/linux/rpm/*.rpm
